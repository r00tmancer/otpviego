name: Refresh Viego stats

on:
  schedule:
    # Her 10 dakikada bir — her maç sonrası ~10 dk içinde stats.json güncellenir
    # (GitHub Actions cron'u 5-15 dk gecikebilir, garanti değil ama pratikte yeterli)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Actions sekmesinden manuel tetikleme

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # repo'ya commit atabilsin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch stats
        run: python3 scripts/fetch_stats.py

      - name: Commit if changed
        run: |
          if ! git diff --quiet stats.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add stats.json
            git commit -m "chore: refresh Viego stats $(date -u +%Y-%m-%d)"
            git push
          else
            echo "stats.json değişmedi, commit atlandı."
          fi
